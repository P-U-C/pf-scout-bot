name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build changelog since last tag
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges | head -30)
          else
            LOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Exclude dev/build artifacts
          tar -czf pf-scout-bot-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='bot/node_modules' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            .
          sha256sum pf-scout-bot-${VERSION}.tar.gz > pf-scout-bot-${VERSION}.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "pf-scout-bot ${{ steps.version.outputs.version }}"
          body: |
            ## pf-scout-bot ${{ steps.version.outputs.version }}

            Conversational scout bot for the Post Fiat Task Node — contributor discovery, recruitment, and networking via the PFTL chain agent interface.

            ### Changes
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```

            ### Install
            ```bash
            git clone https://github.com/P-U-C/pf-scout-bot /opt/pf-scout-bot
            cd /opt/pf-scout-bot && git checkout ${{ steps.version.outputs.version }}
            cp deploy/.env.example .env  # configure secrets
            sudo bash deploy/install.sh
            ```

            ### Components
            - **scout-api** — FastAPI intelligence layer (port 8420)
            - **bot** — Autonomous XRPL polling bot
            - **enrichment** — Leaderboard sync, relationship graph, external prospects (6h timer)
          files: |
            pf-scout-bot-${{ steps.version.outputs.version }}.tar.gz
            pf-scout-bot-${{ steps.version.outputs.version }}.tar.gz.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
